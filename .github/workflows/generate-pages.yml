name: Generate Opportunity Pages

on:
  push:
    paths:
      - "data/opportunities/**"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Generate pages
        run: node scripts/generate-pages.js

      - name: Commit generated pages
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add opportunities/
          git commit -m "Auto-generate opportunity pages" || echo "No changes"
          git push
